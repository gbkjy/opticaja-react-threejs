name: Compilación y despliegue de OptiCaja

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package*.json'
      - 'vite.config.js'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - 'nginx.conf'
      - '.github/workflows/**'
  workflow_dispatch: 

jobs:
  compilar-y-subir:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y subir imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/opticaja:latest

  desplegar:
    needs: compilar-y-subir
    runs-on: ubuntu-latest
    steps:
      - name: Desplegar en VPS vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/opticaja
            git fetch --all
            git reset --hard origin/main
            docker compose pull
            docker compose up -d --wait
            docker image prune -f
